<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Animal Slider</title>
  <style>
    body { margin: 0; font-family: Arial; background: #111; color: white; text-align: center; }
    #slider { position: relative; max-width: 800px; margin: 50px auto; }
    img { width: 100%; height: 400px; object-fit: cover; display: none; }
    img.active { display: block; }
    .info { position: absolute; bottom: 20px; left: 20px; text-align: left; }
    h2 { margin: 0; }
    .status { color: orange; }
    </style>
  </head>
  <body>
    <div id="slider">
        <img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/123024/leopard2.jpg" class="active">
        <img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/123024/lion2.jpg">
        <img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/123024/tiger2.jpg">
        <img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/123024/bear2.jpg">
        <div class="info">
              <h2 id="title">Amur Leopard</h2>h2>
              <div id="status" class="status">Critically Endangered</div>div>
        </div>div>
    </div>div>
    <script>
      const titles = ["Amur Leopard", "Asiatic Lion", "Siberian Tiger", "Brown Bear"];
      const status = ["Critically Endangered", "Endangered", "Endangered", "Least Concern"];
      const images = document.querySelectorAll("#slider img");
      const title = document.getElementById("title");
      const stat = document.getElementById("status");
      let index = 0;
      function showSlide(i) {
          images.forEach(img => img.classList.remove("active"));
          images[i].classList.add("active");
          title.textContent = titles[i];
          stat.textContent = status[i];
      }
      setInterval(() => {
          index = (index + 1) % images.length;
          showSlide(index);
      }, 3000);
    </script>
  </body>
</html>html>
    </script>
  </body>
  </style></title>
